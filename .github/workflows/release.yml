name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string

jobs:
  # ── Validate Version ──────────────────────────────────────────────────────
  validate:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag or input
        id: get_version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Verify Cargo.toml version matches
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [[ "$VERSION" != "$CARGO_VERSION" ]]; then
            echo "❌ Version mismatch: tag/input=$VERSION, Cargo.toml=$CARGO_VERSION"
            exit 1
          fi
          echo "✅ Version validated: $VERSION"

  # ── Cross-Platform Build ──────────────────────────────────────────────────
  build:
    name: Build Release (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: bevy_retro_shaders-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: bevy_retro_shaders-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: bevy_retro_shaders-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-${{ matrix.target }}-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Build library
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build examples
        run: |
          cargo build --release --target ${{ matrix.target }} --example crt_example --features "jpeg,hot_reload"
          cargo build --release --target ${{ matrix.target }} --example crt_3d_example

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/examples/crt_example.exe" "artifacts/"
            cp "target/${{ matrix.target }}/release/examples/crt_3d_example.exe" "artifacts/"
          else
            cp "target/${{ matrix.target }}/release/examples/crt_example" "artifacts/"
            cp "target/${{ matrix.target }}/release/examples/crt_3d_example" "artifacts/"
          fi
          cp README.md LICENSE CHANGELOG.md artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/
          retention-days: 30

  # ── Create GitHub Release ─────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release archives
        run: |
          for dir in bevy_retro_shaders-*; do
            if [[ -d "$dir" ]]; then
              cd "$dir"
              zip -r "../${dir}.zip" .
              cd ..
            fi
          done

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${{ needs.validate.outputs.version }}
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## Release v$VERSION" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Examples" >> $GITHUB_OUTPUT
          echo "- \`crt_example\` - 2D interactive demo" >> $GITHUB_OUTPUT
          echo "- \`crt_3d_example\` - 3D interactive demo" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: Release v${{ needs.validate.outputs.version }}
          body: ${{ steps.release_notes.outputs.notes }}
          files: |
            *.zip
          draft: false
          prerelease: false
          generate_release_notes: true

  # ── Publish to crates.io ──────────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    needs: [validate, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-publish-

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
